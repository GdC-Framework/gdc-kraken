{% extends "admin/change_list.html" %}
{% load admin_list %}

{% block result_list %}
  <style>
    tr.missing-display-name { background: #ffdddd !important; }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('tbody tr').forEach(function(row) {
        var displayNameCell = row.querySelector('td.field-display_name');
        if (displayNameCell && !displayNameCell.textContent.trim()) {
          row.classList.add('missing-display-name');
        }
      });
    });
  </script>
  {{ block.super }}
{% endblock %}
