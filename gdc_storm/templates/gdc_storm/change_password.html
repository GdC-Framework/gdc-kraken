{% extends 'gdc_storm/base.html' %}
{% block title %}Changer le mot de passe{% endblock %}
{% block content %}
<div class="change-password-container" style="max-width:500px;margin:40px auto;padding:32px 32px 24px 32px;border-radius:18px;background:#fff;box-shadow:0 2px 16px #0002;">
    <h2 style="margin-bottom:24px;">Changer le mot de passe</h2>
    {% if messages %}
        <div class="message-block">
            {% for message in messages %}
                <div class="message-{{ message.tags|default:'info' }}">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
    <form method="post" action="">
        {% csrf_token %}
        <div style="margin-bottom:18px;">
            <label for="old_password"><strong>Ancien mot de passe :</strong></label><br>
            <input type="password" id="old_password" name="old_password" required style="width:100%;padding:8px;margin-top:4px;">
        </div>
        <div style="margin-bottom:18px;">
            <label for="new_password1"><strong>Nouveau mot de passe :</strong></label><br>
            <input type="password" id="new_password1" name="new_password1" required style="width:100%;padding:8px;margin-top:4px;">
        </div>
        <div style="margin-bottom:24px;">
            <label for="new_password2"><strong>Confirmer le nouveau mot de passe :</strong></label><br>
            <input type="password" id="new_password2" name="new_password2" required style="width:100%;padding:8px;margin-top:4px;">
        </div>
        <div style="display:flex;justify-content:space-between;gap:16px;">
            <a href="/" class="home-btn" style="background:#eee;color:#222;padding:10px 32px;border-radius:8px;text-align:center;text-decoration:none;">Annuler</a>
            <button type="submit" class="home-btn" style="background:#1976d2;color:#fff;padding:10px 32px;border-radius:8px;">Valider</button>
        </div>
    </form>
</div>
{% endblock %}
